<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>用户管理 · XZWP 管理后台</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/users.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="side-brand"><span class="brand-mark">XZ</span><span class="brand-text">闲置微铺<small>运营管理后台</small></span></div>
    <nav class="side-nav">
      <a href="dashboard.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>仪表盘</span></a>
      <a href="users.html" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span>用户管理</span></a>
      <a href="products.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg><span>商品管理</span></a>
      <a href="orders.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.2"/><circle cx="3.5" cy="12" r="1.2"/><circle cx="3.5" cy="18" r="1.2"/></svg><span>订单管理</span></a>
      <a href="payconfig.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><circle cx="7" cy="14.5" r="1.5" fill="currentColor"/></svg><span>支付配置</span></a>
      <a href="finance.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span>财务管理</span></a>
    </nav>
    <div class="side-foot">
      <div class="side-user"><div class="side-avatar" id="sideAvatar">A</div><div class="side-meta"><div class="side-name" id="sideName">管理员</div><button class="side-logout" data-act="logout">退出登录</button></div></div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left"><h1 class="page-title">用户管理</h1><span class="page-date" id="pageDate"></span></div>
      <div class="topbar-right"><span class="top-admin" id="adminName"></span><button class="btn btn-ghost" data-act="logout">退出</button></div>
    </header>

    <div class="page-body" id="userApp">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">用户列表</div>
          <div class="panel-tools">
            <div class="search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
              <input v-model="kw" @input="onSearch" placeholder="搜索账号 / 昵称" />
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <table class="list">
            <thead><tr><th>ID</th><th>账号</th><th>昵称</th><th>余额</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-if="!loading && list.length===0"><td colspan="7" class="fempty">暂无用户</td></tr>
              <tr v-for="u in list" :key="u.id">
                <td>{{ u.id }}</td>
                <td>{{ u.username }}</td>
                <td>{{ u.nickname || '-' }}</td>
                <td>&yen;{{ fmt(u.balance) }}</td>
                <td>
                  <span v-if="u.is_admin==1" class="badge badge--admin">管理员</span>
                  <span v-else-if="u.banned==1" class="badge badge--banned">已封禁</span>
                  <span v-else class="badge badge--on">正常</span>
                </td>
                <td>{{ fmtTime(u.created_at) }}</td>
                <td>
                  <template v-if="u.is_admin!=1">
                    <button class="btn btn-sm btn-ghost" @click="syncBalance(u)" title="根据财务记录重新计算余额">同步余额</button>
                    <button class="btn btn-sm" :class="u.banned==1?'btn-primary':'btn-danger'" @click="banUser(u)">{{ u.banned==1 ? '解封' : '封禁' }}</button>
                    <button class="btn btn-sm btn-danger" @click="delUser(u)">删除</button>
                  </template>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div><!-- /#userApp -->
  </div>
</div>

<nav class="tabbar">
  <a href="dashboard.html" class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>仪表盘</span></a>
  <a href="users.html" class="tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span>用户</span></a>
  <a href="products.html" class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg><span>商品</span></a>
  <a href="orders.html" class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg><span>订单</span></a>
  <a href="payconfig.html" class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>支付</span></a>
  <a href="finance.html" class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span>财务</span></a>
</nav>

<script src="../js/v3.2.8/vue.global.prod.js"></script>
<script src="js/shared.js"></script>
<script src="js/users.js"></script>
</body>
</html>
