  <div class="main">
    <header class="topbar">
      <div class="topbar-left"><h1 class="page-title">轮播图管理</h1><span class="page-date" id="pageDate"></span></div>
      <div class="topbar-right"><span class="top-admin" id="adminName"></span><button class="btn btn-ghost" data-act="logout">退出</button></div>
    </header>

    <div class="page-body" id="bannerApp">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">轮播图列表</div>
          <div class="panel-tools">
            <button class="btn btn-sm btn-primary" @click="openAdd">+ 添加轮播图</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="list">
            <thead><tr><th>图片</th><th>标题</th><th>跳转链接</th><th>排序</th><th>状态</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-if="!loading && list.length===0"><td colspan="6" class="fempty">暂无轮播图，点击右上角添加</td></tr>
              <tr v-for="b in list" :key="b.id">
                <td>
                  <img v-if="b.img" class="banner-thumb" :src="imgUrl(b.img)" alt="" @click="zoom(b.img)" style="cursor:pointer" />
                  <div v-else class="banner-thumb banner-thumb--empty"></div>
                </td>
                <td>{{ b.title || '-' }}</td>
                <td class="banner-link">{{ b.link || '-' }}</td>
                <td>{{ b.sort_order || 0 }}</td>
                <td>
                  <span v-if="b.status==1" class="badge badge--on">启用</span>
                  <span v-else class="badge badge--off">禁用</span>
                </td>
                <td>
                  <button class="btn btn-sm" :class="b.status==1?'btn-danger':''" @click="toggle(b)">{{ b.status==1?'禁用':'启用' }}</button>
                  <button class="btn btn-sm btn-danger" @click="del(b)">删除</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 添加弹窗（在 #bannerApp 内，Vue 管理 v-if） -->
      <transition name="modal-fade">
        <div class="modal-overlay show" v-if="showAdd" @click.self="showAdd=false">
          <div class="modal">
            <div class="modal-head"><h3 class="modal-title">添加轮播图</h3><button class="modal-close" @click="showAdd=false">&times;</button></div>
            <form @submit.prevent="submit">
              <div class="field">
                <label class="field-label">轮播图片<span class="req">*</span></label>
                <div class="banner-picker" :class="{'has-img': !!form.img}" @click="pickImg">
                  <template v-if="form.img">
                    <img :src="form.img" class="banner-picker__img" />
                  </template>
                  <template v-else>
                    <div class="banner-picker__icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5-4 4-2-2-4 4"/></svg>
                    </div>
                    <span class="banner-picker__add">点击选择图片</span>
                    <span class="banner-picker__hint">支持 JPG / PNG / WebP，建议尺寸 1200×400</span>
                  </template>
                  <input ref="file" type="file" accept="image/*" hidden @change="onFile" />
                </div>
              </div>
              <div class="field">
                <label class="field-label">标题</label>
                <input class="field-input" type="text" v-model="form.title" placeholder="如：限时秒杀、新品上架" maxlength="120" />
              </div>
              <div class="field">
                <label class="field-label">跳转链接</label>
                <input class="field-input" type="text" v-model="form.link" placeholder="https://...（点击轮播图跳转地址）" maxlength="255" />
              </div>
              <div class="field">
                <label class="field-label">排序权重</label>
                <input class="field-input" type="number" v-model.number="form.sort_order" min="0" max="999" placeholder="数字越小越靠前显示" />
              </div>
              <div class="modal-foot">
                <button type="submit" class="btn btn-primary" :disabled="saving">{{ saving ? '保存中...' : '保存' }}</button>
                <button type="button" class="btn btn-ghost" @click="showAdd=false">取消</button>
              </div>
            </form>
          </div>
        </div>
      </transition>
    </div><!-- /#bannerApp -->
  </div>
</div>
