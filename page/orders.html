<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#13c2a3" />
  <title>闲置微铺 - 我的订单</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/orders.css" />
</head>
<body data-title="我的订单">
<div id="navbar"></div>

<main class="container" id="ordersApp">

  <!-- 页头 -->
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">&lsaquo; 返回</button>
    <h2 class="page-title">我的订单</h2>
    <span class="order-count">{{ orderList.length }} 笔</span>
  </div>

  <!-- 状态筛选 Tab -->
  <div class="status-tabs">
    <button
      v-for="tab in tabs" :key="tab.key"
      :class="['status-tab', { active: currentTab === tab.key }]"
      @click="currentTab = tab.key"
    >{{ tab.label }}</button>
  </div>

  <!-- 订单列表 -->
  <div class="order-list">
    <template v-if="filteredOrders.length">
      <div v-for="o in filteredOrders" :key="o.id" class="order-card">
        <div class="order-card__head">
          <span class="order-card__id">订单 #{{ o.id }}</span>
          <span :class="['badge', statusBadgeClass(o.status)]">{{ statusText(o.status) }}</span>
        </div>
        <div class="order-card__body">
          <img
            v-if="o.img"
            class="order-card__img"
            :src="imgUrl(o.img)"
            :alt="o.title"
            @click="zoomImg(o.img)"
          />
          <div class="order-card__info">
            <p class="order-card__title">{{ o.title }}</p>
            <p class="order-card__publisher">发布人：<b>{{ o.publisher }}</b></p>
            <p class="order-card__time">{{ fmtTime(o.created_at) }}</p>
          </div>
        </div>
        <div class="order-card__foot">
          <span class="order-card__price">&yen;{{ o.price }}</span>
          <span v-if="o.status==='completed' && o.actual_paid" class="order-paid-hint">已打款 ¥{{ o.actual_paid }}</span>
          <span v-if="o.status==='rejected'" class="order-refund-hint">已退回余额</span>
        </div>
      </div>
    </template>

    <!-- 空 -->
    <div v-else-if="loaded" class="empty-state">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg><br/>{{ currentTab==='all' ? '暂无订单' : '暂无' + tabs.find(t=>t.key===currentTab).label + '的订单' }}
    </div>

    <!-- 加载中 -->
    <div v-if="!loaded" class="loading-state">
      <div class="spinner"></div> 加载中…
    </div>
  </div>

</main>

<div id="footer"></div>

<script src="../js/v3.2.8/vue.global.prod.js"></script>
<script src="js/common.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
