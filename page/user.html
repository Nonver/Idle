<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#13c2a3" />
  <title>闲置微铺 - 个人中心</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/user.css" />
</head>
<body>
<div id="navbar"></div>

<main class="container" id="userApp">
  <!-- 未登录 -->
  <section v-if="!isLoggedIn" class="auth-wrap">
    <div class="card auth-guest">
      <div class="auth-guest__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <p class="auth-guest__text">登录后查看个人中心</p>
      <a href="login.html" class="btn-login">去 登录 / 注 册</a>
    </div>
  </section>

  <!-- 已登录 -->
  <section v-else>
    <div class="card profile-head">
      <div
        class="profile-head__avatar"
        :style="user.avatar ? { backgroundImage:'url('+imgUrl(user.avatar)+')', backgroundSize:'cover', backgroundPosition:'center', color:'transparent' } : {}"
      >{{ user.avatar ? '' : (user.nickname||'?').slice(0,1) }}</div>
      <div>
        <p class="profile-head__name">{{ user.nickname }}</p>
        <div class="profile-head__sub">{{ '账号：' + user.username }}</div>
      </div>
    </div>

    <div class="profile-balance">
      <span class="profile-balance__label">我的余额</span>
      <span class="profile-balance__num">&yen;{{ user.balance || 0 }}</span>
    </div>

    <div v-if="contact" class="contact-bar" @click="copyContact">
      <svg class="contact-bar__ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h4v16H4zM4 9h4M14 4h6v16h-6zM14 9h6M9 12h5"/></svg>
      <span class="contact-bar__txt">联系客服：{{ contact }}</span>
      <span class="contact-bar__copy">复制</span>
    </div>

    <div class="menu">
      <div v-for="item in menuItems" :key="item.act" class="menu__item" @click="onMenuAct(item)">
        <span class="menu__icon" v-html="item.icon"></span>
        <span class="menu__label">{{ item.label }}</span><span class="menu__arrow">&rsaquo;</span>
      </div>
    </div>
  </section>

  <!-- 订单弹窗（必须在 #userApp 内，Vue 才能管理 v-if / @click） -->
  <transition name="modal-fade">
    <div v-if="showOrders" class="modal-mask" @click.self="showOrders=false">
      <div class="modal-card">
        <div class="modal-head"><h3>我的订单（{{ orderList.length }}）</h3><button @click="showOrders=false">&times;</button></div>
        <div class="modal-body" style="max-height:50vh;overflow:auto">
          <template v-if="orderList.length">
            <div v-for="o in orderList" :key="o.id" class="order-item">
              <div class="order-top"><span>{{ o.title }}</span><span>&yen;{{ o.price }}</span></div>
              <div class="order-meta">{{ o.publisher }} &middot; {{ fmtTime(o.created_at) }} &middot; {{ orderStatusText(o.status) }}</div>
            </div>
          </template>
          <div v-else class="empty-state">暂无订单</div>
        </div>
        <div class="modal-foot"><button class="btn btn-ghost" @click="showOrders=false">关闭</button></div>
      </div>
    </div>
  </transition>

  <!-- 提现弹窗（必须在 #userApp 内） -->
  <transition name="modal-fade">
    <div v-if="showWithdraw" class="modal-mask" @click.self="showWithdraw=false">
      <div class="modal-card wd-modal">
        <div class="modal-head"><h3>提现</h3><button @click="showWithdraw=false">&times;</button></div>
        <div class="modal-body">
          <div class="wd-amount-wrap">
            <span class="wd-balance-hint">可提现余额：¥{{ user.balance || 0 }}</span>
          </div>

          <!-- 收款方式选择 -->
          <div class="fgroup">
            <label>收款方式</label>
            <div class="pay-method-tabs">
              <button type="button" :class="{ active: wdPayMethod==='alipay' }" @click="wdPayMethod='alipay'">支付宝</button>
              <button type="button" :class="{ active: wdPayMethod==='qrcode' }" @click="wdPayMethod='qrcode'">收款码</button>
            </div>
          </div>

          <!-- 支付宝账号 -->
          <div v-if="wdPayMethod==='alipay'" class="fgroup">
            <label for="wdAlipay">支付宝账号 / 手机号</label>
            <input id="wdAlipay" type="text" placeholder="请输入支付宝账号或绑定的手机号" v-model.trim="wdAlipayAccount" class="finp" />
          </div>

          <!-- 收款二维码上传 -->
          <div v-if="wdPayMethod==='qrcode'" class="fgroup">
            <label>收款二维码</label>
            <div class="qr-upload-area" @click="$refs.wdQrInput.click()">
              <img v-if="wdQrBase64" :src="wdQrBase64" class="qr-preview" alt="预览" />
              <template v-else>
                <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg>
                <span>点击上传微信/支付宝收款码</span>
                <small>JPG / PNG，建议正方形</small>
              </template>
              <input ref="wdQrInput" type="file" accept="image/*" hidden @change="onWdQrChange" />
            </div>
          </div>

          <!-- 备注（选填） -->
          <div class="fgroup">
            <label for="wdRemark">备注 <span style="font-weight:400;color:var(--text-soft)">选填</span></label>
            <input id="wdRemark" type="text" placeholder="如：真实姓名、附加说明等" v-model.trim="wdRemark" class="finp" />
          </div>

          <div class="fgroup">
            <label>提现金额</label>
            <input type="number" min="1" :max="user.balance||0" placeholder="请输入提现金额（¥）" v-model.number="withdrawAmount" class="finp" />
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" @click="showWithdraw=false">取消</button>
          <button class="btn btn-primary" @click="doWithdraw" :disabled="withdrawing">{{ withdrawing ? '提交中…' : '确认提现' }}</button>
        </div>
      </div>
    </div>
  </transition>

  <!-- 修改密码弹窗 -->
  <transition name="modal-fade">
    <div v-if="showPwd" class="modal-mask" @click.self="showPwd=false">
      <div class="modal-card">
        <div class="modal-head"><h3>修改密码</h3><button @click="showPwd=false">&times;</button></div>
        <form @submit.prevent="doChangePwd" class="modal-body">
          <div class="fgroup">
            <label for="pwdOld">当前密码</label>
            <input id="pwdOld" type="password" placeholder="请输入当前密码" v-model="pwdForm.oldPwd" class="finp" autocomplete="current-password" />
          </div>
          <div class="fgroup">
            <label for="pwdNew">新密码</label>
            <input id="pwdNew" type="password" placeholder="请输入新密码（至少6位）" v-model="pwdForm.newPwd" class="finp" autocomplete="new-password" minlength="6" />
          </div>
          <div class="fgroup">
            <label for="pwdConfirm">确认新密码</label>
            <input id="pwdConfirm" type="password" placeholder="请再次输入新密码" v-model="pwdForm.confirmPwd" class="finp" autocomplete="new-password" />
          </div>
          <div class="modal-tip">修改密码后需要重新登录，请妥善保管新密码。</div>
        </form>
        <div class="modal-foot">
          <button class="btn btn-ghost" @click="showPwd=false">取消</button>
          <button class="btn btn-primary" @click="doChangePwd" :disabled="changingPwd">{{ changingPwd ? '提交中…' : '确认修改' }}</button>
        </div>
      </div>
    </div>
  </transition>

</main>

<div id="footer"></div>

<script src="../js/v3.2.8/vue.global.prod.js"></script>
<script src="/config.js"></script>
<script src="js/common.js"></script>
<script src="js/user.js"></script>
</body>
</html>
