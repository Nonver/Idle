<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>商品详情 · 闲置微铺</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/product-detail.css" />
</head>
<body data-title="商品详情" data-back="products.html">
<main class="container" id="detailApp">

  <!-- 加载状态 -->
  <div v-if="loading && !product" class="detail-loading">
    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#13c2a3" stroke-width="1.5"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/><circle cx="12" cy="12" r="9" stroke-dasharray="40" stroke-dashoffset="10"><animate attributeName="stroke-dashoffset" values="40;10;40" dur="1.5s" repeatCount="indefinite"/></circle></svg>
    <span>加载中...</span>
  </div>

  <!-- 商品不存在 -->
  <div v-if="!loading && !product" class="detail-empty">
    <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="#d1d5db" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg><br/>商品不存在或已下架<br/>
    <button class="btn btn--accent" style="margin-top:16px;padding:10px 28px;border-radius:12px" onclick="location.href='products.html'">返回商品列表</button>
  </div>

  <!-- 详情内容 -->
  <template v-if="product">
    <!-- 大图 -->
    <div class="detail-img-wrap">
      <img v-if="productImg" :src="productImg" :alt="product.title" @click="zoomImg(productImg)" class="detail-img" />
      <div v-else class="detail-img-placeholder">
        <svg viewBox="0 0 80 80" fill="none" stroke="#cbd5e1" stroke-width="1.5"><rect x="6" y="14" width="68" height="52" rx="6"/><circle cx="30" cy="34" r="7"/><path d="M66 50l-13-13-7 7-8-8-15 15"/></svg>
      </div>
    </div>

    <!-- 标题区 -->
    <div class="detail-header">
      <h1 class="detail-title">{{ product.title }}
        <em v-if="product._type==='admin_order'" class="tag-admin">官方</em>
      </h1>
      <div class="detail-meta">
        <span class="detail-publisher">发布人：<b>{{ product.publisher || '-' }}</b></span>
        <span v-if="catName(product)" class="detail-cat">{{ catName(product) }}</span>
      </div>
      <div class="detail-price-row">
        <span class="detail-price">&yen;{{ product.price }}</span>
        <span v-if="product.custom_price" class="badge badge--pub">支持自定义金额</span>
      </div>
    </div>

    <!-- 描述（始终显示） -->
    <div class="detail-section">
      <h2 class="detail-section__title">商品描述</h2>
      <div class="detail-desc">{{ (product.description||'').trim() || product.buyer_note || '暂无描述说明' }}</div>
    </div>

    <!-- 操作栏（固定底部） -->
    <div class="detail-action-bar">
      <div class="detail-price-sm">&yen;{{ product.price }}</div>
      <button v-if="isOwn(product)" class="btn btn--disabled" disabled>我的商品</button>
      <button v-else-if="product._type==='admin_order'" class="btn btn--buy btn--buy-pub" @click="doBuy">购买</button>
      <button v-else class="btn btn--buy" @click="doBuy">购买</button>
    </div>

    <!-- 购买弹窗 -->
    <transition name="modal-fade">
      <div v-if="showBuyModal" class="modal-mask" :class="{show:showBuyModal}" @click.self="showBuyModal=false">
        <div class="modal-card">
          <div class="modal-head"><h3>确认购买</h3><button @click="showBuyModal=false">&times;</button></div>
          <div class="modal-body">
            <div class="buy-m-title">{{ product.title }}</div>
            <div class="buy-m-pub">发布人：{{ product.publisher }}</div>

            <!-- 价格/自定义 -->
            <div v-if="!showCustomPrice" class="buy-m-price">&yen;{{ product.price }}</div>
            <div v-else class="buy-m-cp-wrap">
              <div class="buy-m-cp-original">原价 &yen;{{ product.price }}</div>
              <div class="buy-m-cp-input-row">
                <span class="buy-m-yen">&yen;</span>
                <input type="number" min="0.01" step="0.01" v-model.number="customAmount" class="buy-m-cp-input" placeholder="输入金额" />
              </div>
              <div class="buy-m-cp-hint">参考价 &yen;{{ product.price }}，可自行调整</div>
            </div>

            <!-- 描述（截断2行） -->
            <div v-if="(product.description||'').trim() || (product.buyer_note||'').trim()" class="buy-m-desc">
              {{ (product.description||'').trim() || product.buyer_note }}
            </div>

            <!-- 备注 -->
            <div class="buy-field">
              <label class="buy-field-label">备注（选填）</label>
              <div class="buy-note-wrap">
                <textarea v-model="buyerNote" class="buy-note-input" placeholder="如：代领快递，取件码 12-3-4" maxlength="500" rows="2"></textarea>
                <span class="buy-note-count">{{ (buyerNote||'').length }}/500</span>
              </div>
            </div>

            <!-- 图片上传 -->
            <div class="buy-field">
              <label class="buy-field-label">上传图片（选填）</label>
              <input type="file" ref="buyImgInput" accept="image/*" capture="environment" style="display:none" @change="pickBuyImg" />
              <div v-if="!(buyerImgPreview||'')" class="buy-img-placeholder" @click="$refs.buyImgInput && $refs.buyImgInput.click()">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#13c2a3" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5-4 4-2-2-4 4"/></svg>
                <span>点击上传图片</span>
                <small>取件码截图 / 代领凭证（最多1张）</small>
              </div>
              <div v-else class="buy-img-preview">
                <img :src="(buyerImgPreview||'')" @click="zoomImg(buyerImgPreview)" />
                <button class="buy-img-remove" @click.stop="clearBuyImg">&times;</button>
              </div>
            </div>
          </div>
          <div class="modal-foot">
            <button class="btn btn-ghost" @click="showBuyModal=false">取消</button>
            <button class="btn btn-primary" :disabled="buying" @click="confirmBuy">{{ buying ? '支付中...' : '确认支付' }}</button>
          </div>
        </div>
      </div>
    </transition>
  </template>

</main>

<script src="../js/v3.2.8/vue.global.prod.js"></script>
<script src="/config.js"></script>
<script src="js/common.js"></script>
<script src="js/product-detail.js"></script>
</body>
</html>
