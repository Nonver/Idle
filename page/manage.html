<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#13c2a3" />
  <title>闲置微铺 - 管理</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/manage.css" />
</head>
<body data-title="商品管理">
<div id="navbar"></div>

<main class="container" id="manageApp">
  <!-- Tab 切换 -->
  <div class="tabs">
    <button :class="{ active: tab==='publish' }" @click="switchTab('publish')">发布商品</button>
    <button :class="{ active: tab==='mine' }" @click="switchTab('mine')">我的商品</button>
  </div>

  <!-- 发布商品 -->
  <section v-show="tab==='publish'" class="panel">
    <div class="card publish-card">
      <div class="field">
        <label>商品标题</label>
        <input v-model="form.title" type="text" placeholder="例如：九成新 山地自行车" maxlength="40" />
      </div>
      <div class="field">
        <label>商品图片</label>
        <div class="img-picker" @click="$refs.pImage.click()">
          <span v-if="!imgData">{{ imgHint }}</span>
          <img v-else :src="imgData" alt="预览" style="display:block;max-width:100%;max-height:200px;object-fit:cover;border-radius:8px" />
          <input ref="pImage" type="file" accept="image/*" hidden @change="onImgChange" />
        </div>
      </div>
      <div class="field">
        <label>价格（¥）</label>
        <input v-model.number="form.price" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>
      <div class="field">
        <label>发布人</label>
        <input :value="me.nickname" type="text" readonly />
        <div class="hint">默认取当前登录账号，发布后不可修改</div>
      </div>
      <button class="btn btn--accent btn--block" :disabled="publishing" @click="doPublish">{{ publishing ? '发布中...' : '发布商品' }}</button>
    </div>
  </section>

  <!-- 我的商品 -->
  <section v-show="tab==='mine'" class="panel">
    <template v-if="myList.length > 0">
      <div v-for="p in myList" :key="p.id" class="card my-item">
        <img :src="imgUrl(p.img)" :alt="p.title" @click="zoomImg(p.img)" style="cursor:pointer" />
        <div class="my-item__info">
          <p class="my-item__title">{{ p.title }}</p>
          <div class="my-item__meta">发布人：{{ p.publisher }}</div>
          <div class="my-item__price price">&yen;{{ p.price }}</div>
          <span class="badge" :class="p.status==='on'?'badge--on':'badge--off'">{{ p.status==='on'?'在售':'已下架' }}</span>
        </div>
        <div class="my-item__ops">
          <button class="btn btn--sm" @click="toggleProd(p)">{{ p.status==='on'?'下架':'上架' }}</button>
          <button class="btn btn--sm btn-danger" @click="delProd(p)">删除</button>
        </div>
      </div>
    </template>
    <div v-else class="empty-state" style="grid-column:1/-1;padding:40px;text-align:center;color:#999;">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg><br/>你还没有发布商品
    </div>
  </section>
</main>

<div id="footer"></div>

<script src="../js/v3.2.8/vue.global.prod.js"></script>
<script src="js/common.js"></script>
<script src="js/manage.js"></script>
</body>
</html>
